version: 2
updates:
  # Keep npm dependencies up to date
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      production-dependencies:
        dependency-type: production
      dev-dependencies:
        dependency-type: development
    ignore:
      # eslint-config-next is pinned to the Next version and bundles an
      # eslint-plugin-react that isn't ESLint 10-ready (it calls the removed
      # context.getFilename()), so ESLint 10 crashes `eslint`. Hold the major
      # until a compatible eslint-config-next ships. (See decisions D20.)
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # Keep GitHub Actions versions up to date
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
