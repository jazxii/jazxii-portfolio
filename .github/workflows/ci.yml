name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - "LICENSE"

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    name: Accessibility + Lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      # --- Accessibility (axe-core via Playwright) ---
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - name: axe-core e2e (zero violations required)
        run: npx playwright test

      # --- Lighthouse ---
      - name: Start production server
        run: |
          npm run start -- --port 3210 &
          npx wait-on http://localhost:3210
      - name: Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3210/
            http://localhost:3210/work
          configPath: .github/lighthouse/lighthouserc.json
          temporaryPublicStorage: true
          uploadArtifacts: true
      - name: Comment Lighthouse results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          MANIFEST: ${{ steps.lighthouse.outputs.manifest }}
          LINKS: ${{ steps.lighthouse.outputs.links }}
        with:
          script: |
            const manifest = JSON.parse(process.env.MANIFEST || '[]');
            const links = JSON.parse(process.env.LINKS || '{}');
            const reps = manifest.filter((r) => r.isRepresentativeRun);

            const icon = (s) => (s >= 0.9 ? '🟢' : s >= 0.5 ? '🟠' : '🔴');
            const pct = (s) => Math.round(s * 100);
            const path = (u) => u.replace('http://localhost:3210', '') || '/';

            let body = '<!-- lighthouse-comment -->\n## 🔦 Lighthouse results\n\n';
            body += '| Page | Perf | A11y | Best Practices | SEO | Report |\n';
            body += '|---|---|---|---|---|---|\n';
            for (const r of reps) {
              const s = r.summary;
              const link = links[r.url] ? `[view](${links[r.url]})` : '—';
              body += `| \`${path(r.url)}\` | ${icon(s.performance)} ${pct(s.performance)} | ${icon(s.accessibility)} ${pct(s.accessibility)} | ${icon(s['best-practices'])} ${pct(s['best-practices'])} | ${icon(s.seo)} ${pct(s.seo)} | ${link} |\n`;
            }
            body += '\n_Accessibility must be 100 (blocking); performance < 90 warns._';

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes('<!-- lighthouse-comment -->'));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  preview:
    name: PR build preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
      - run: npm ci
      - name: Build static export
        run: npx next build
      - name: Upload preview build
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-${{ github.event.number }}
          path: ./out
          if-no-files-found: error
      - name: Comment preview info on PR
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '<!-- preview-comment -->',
              '## 📦 PR build preview',
              '',
              'The static export built successfully. GitHub Pages has no live per-PR URL, so download the artifact to preview locally:',
              '',
              `👉 **[Open this run](${runUrl})** → *Artifacts* → \`pr-preview-${context.issue.number}\``,
              '',
              '```bash',
              '# after downloading and unzipping the artifact',
              'npx serve out',
              '```',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes('<!-- preview-comment -->'));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
