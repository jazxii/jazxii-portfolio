name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - name: axe-core e2e (zero violations required)
        run: npx playwright test
      - name: Lighthouse CI
        run: |
          npm run start -- --port 3210 &
          npx wait-on http://localhost:3210
          npx @lhci/cli@0.14.x autorun \
            --collect.url=http://localhost:3210/ \
            --collect.url=http://localhost:3210/work \
            --collect.settings.preset=desktop \
            --assert.assertions.categories:accessibility=error:1 \
            --assert.assertions.categories:performance=warn:0.9
