<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-labelledby="nt2 nd2">
  <title id="nt2">ReAct agent over the WCAG graph with nine tools</title>
  <desc id="nd2">A ReAct reasoning loop of thought, action and observation queries a nine-tool belt to answer grounded accessibility questions.</desc>
  <defs>
    <radialGradient id="nbg2" cx="36%" cy="32%" r="92%"><stop offset="0%" stop-color="#15191E"/><stop offset="100%" stop-color="#0A0C0E"/></radialGradient>
    <pattern id="ng2" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1E242B" stroke-width="1" opacity="0.6"/></pattern>
    <marker id="nar" markerWidth="12" markerHeight="12" refX="7" refY="6" orient="auto"><path d="M2 2l6 4 -6 4" fill="none" stroke="#F5A524" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <style>
      .eye{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:18px;letter-spacing:3px;fill:#8B8470}
      .tag{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:16px;letter-spacing:2px;fill:#F5A524}
      .h{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:700;fill:#F5EFE2}
      .sub{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:22px;fill:#B7AE98}
      .node{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:600;font-size:20px;fill:#F5EFE2}
      .lab{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:14px;letter-spacing:1px;fill:#8B8470}
      .tool{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:16px;fill:#D8CDB4}
    </style>
  </defs>
  <rect width="1280" height="800" fill="url(#nbg2)"/><rect width="1280" height="800" fill="url(#ng2)"/>
  <text x="80" y="92" class="eye">02 · ReAct AGENT</text>
  <text x="1200" y="92" class="tag" text-anchor="end">jazxii</text>

  <!-- ReAct loop -->
  <text x="160" y="180" class="lab">REASONING LOOP</text>
  <g>
    <rect x="300" y="200" width="220" height="70" rx="16" fill="#191D22" stroke="#F5A524" stroke-width="1.5"/><text x="410" y="243" class="node" text-anchor="middle">Thought</text>
    <rect x="470" y="330" width="220" height="70" rx="16" fill="#191D22" stroke="#38BDF8" stroke-width="1.5"/><text x="580" y="373" class="node" text-anchor="middle">Action</text>
    <rect x="220" y="330" width="220" height="70" rx="16" fill="#191D22" stroke="#A78BFA" stroke-width="1.5"/><text x="330" y="373" class="node" text-anchor="middle">Observation</text>
  </g>
  <path d="M470 250 C 560 260 590 300 600 330" fill="none" stroke="#F5A524" stroke-width="2.5" marker-end="url(#nar)"/>
  <path d="M470 380 C 440 390 380 390 360 400" fill="none" stroke="#F5A524" stroke-width="2.5" marker-end="url(#nar)"/>
  <path d="M330 330 C 320 300 350 270 350 270" fill="none" stroke="#F5A524" stroke-width="2.5" marker-end="url(#nar)"/>
  <!-- query in / answer out -->
  <text x="160" y="244" class="lab" fill="#B7AE98">query →</text>
  <path d="M232 240 L300 235" fill="none" stroke="#B7AE98" stroke-width="2" marker-end="url(#nar)"/>
  <text x="300" y="460" class="lab" fill="#34D399">↓ grounded, cited answer</text>

  <!-- tool belt -->
  <rect x="760" y="170" width="400" height="430" rx="18" fill="#12161A" stroke="#2C333B" stroke-width="1.5"/>
  <text x="786" y="206" class="lab">TOOL BELT · 9</text>
  <g>
    <g transform="translate(786,232)"><circle cx="8" cy="8" r="8" fill="#F5A524"/><text x="32" y="14" class="tool">search_criteria()</text></g>
    <g transform="translate(786,272)"><circle cx="8" cy="8" r="8" fill="#FBBF24"/><text x="32" y="14" class="tool">get_guideline()</text></g>
    <g transform="translate(786,312)"><circle cx="8" cy="8" r="8" fill="#38BDF8"/><text x="32" y="14" class="tool">list_techniques()</text></g>
    <g transform="translate(786,352)"><circle cx="8" cy="8" r="8" fill="#FB7185"/><text x="32" y="14" class="tool">find_failures()</text></g>
    <g transform="translate(786,392)"><circle cx="8" cy="8" r="8" fill="#A78BFA"/><text x="32" y="14" class="tool">cypher_query()</text></g>
    <g transform="translate(786,432)"><circle cx="8" cy="8" r="8" fill="#7DD3FC"/><text x="32" y="14" class="tool">semantic_search()</text></g>
    <g transform="translate(786,472)"><circle cx="8" cy="8" r="8" fill="#34D399"/><text x="32" y="14" class="tool">traverse_graph()</text></g>
    <g transform="translate(786,512)"><circle cx="8" cy="8" r="8" fill="#F5A524"/><text x="32" y="14" class="tool">check_conformance()</text></g>
    <g transform="translate(786,552)"><circle cx="8" cy="8" r="8" fill="#FBBF24"/><text x="32" y="14" class="tool">cite_source()</text></g>
  </g>

  <text x="160" y="700" class="h" font-size="34">Neo4j Agentic Graph RAG for WCAG 2.2</text>
  <text x="160" y="734" class="sub">Independent · ReAct agent with 9 graph-grounded tools</text>
</svg>
