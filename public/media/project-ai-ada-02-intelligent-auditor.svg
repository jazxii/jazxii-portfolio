<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-labelledby="at2 ad2">
  <title id="at2">Intelligent Auditor reasoning over DOM and screenshots</title>
  <desc id="ad2">A language model takes a page screenshot and DOM as input and outputs accessibility findings mapped to WCAG success criteria.</desc>
  <defs>
    <radialGradient id="abg2" cx="50%" cy="30%" r="90%"><stop offset="0%" stop-color="#161A3E"/><stop offset="100%" stop-color="#0A0C20"/></radialGradient>
    <pattern id="ag2" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#23285A" stroke-width="1" opacity="0.5"/></pattern>
    <radialGradient id="core" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#E879F9"/><stop offset="60%" stop-color="#818CF8"/><stop offset="100%" stop-color="#6366F1"/></radialGradient>
    <filter id="aglow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="aarr" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M2 2l6 4 -6 4" fill="none" stroke="#818CF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <style>
      .eye{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:18px;letter-spacing:3px;fill:#8F95C8}
      .tag{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:16px;letter-spacing:2px;fill:#E879F9}
      .h{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:700;fill:#ECEEFF}
      .sub{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:22px;fill:#A6ABDB}
      .lab{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:14px;letter-spacing:1px;fill:#8F95C8}
      .dom{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:14px;fill:#A6ABDB}
      .find{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:16px;fill:#D7DAFF}
      .sc{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:13px;fill:#8F95C8}
    </style>
  </defs>
  <rect width="1280" height="800" fill="url(#abg2)"/><rect width="1280" height="800" fill="url(#ag2)"/>
  <text x="80" y="92" class="eye">02 · INTELLIGENT AUDITOR V2</text>
  <text x="1200" y="92" class="tag" text-anchor="end">jazxii</text>

  <!-- inputs -->
  <text x="120" y="186" class="lab">INPUTS</text>
  <g><!-- screenshot -->
    <rect x="120" y="200" width="250" height="150" rx="14" fill="#12152F" stroke="#2E3470"/>
    <rect x="140" y="220" width="100" height="14" rx="7" fill="#2E3470"/>
    <rect x="140" y="246" width="210" height="10" rx="5" fill="#1E2350"/>
    <rect x="140" y="266" width="180" height="10" rx="5" fill="#1E2350"/>
    <rect x="140" y="300" width="120" height="34" rx="17" fill="#6366F1"/>
    <text x="134" y="346" class="lab" font-size="12">screenshot</text>
  </g>
  <g><!-- DOM -->
    <rect x="120" y="378" width="250" height="170" rx="14" fill="#12152F" stroke="#2E3470"/>
    <text x="140" y="408" class="dom">&lt;main&gt;</text>
    <text x="160" y="432" class="dom">&lt;button&gt;</text>
    <text x="180" y="456" class="dom" fill="#E879F9">aria-label?</text>
    <text x="160" y="480" class="dom">&lt;img&gt;</text>
    <text x="180" y="504" class="dom" fill="#E879F9">alt=""</text>
    <text x="140" y="534" class="lab" font-size="12">DOM tree</text>
  </g>

  <!-- arrows to core -->
  <path d="M370 275 C 460 275 470 360 540 360" fill="none" stroke="#818CF8" stroke-width="2.5" marker-end="url(#aarr)"/>
  <path d="M370 460 C 460 460 470 380 540 372" fill="none" stroke="#818CF8" stroke-width="2.5" marker-end="url(#aarr)"/>

  <!-- LLM core -->
  <g filter="url(#aglow)"><circle cx="640" cy="368" r="78" fill="url(#core)"/></g>
  <circle cx="640" cy="368" r="78" fill="none" stroke="#ECEEFF" stroke-width="1.5" opacity="0.5"/>
  <text x="640" y="362" class="h" font-size="26" text-anchor="middle" fill="#0A0C20">LLM</text>
  <text x="640" y="388" class="lab" font-size="13" text-anchor="middle" fill="#0A0C20">vision + DOM</text>

  <!-- arrow to output -->
  <path d="M718 368 C 790 368 800 368 858 368" fill="none" stroke="#E879F9" stroke-width="2.5" marker-end="url(#aarr)"/>

  <!-- findings -->
  <rect x="862" y="200" width="298" height="336" rx="16" fill="#12152F" stroke="#2E3470"/>
  <text x="886" y="234" class="lab">FINDINGS</text>
  <g>
    <circle cx="894" cy="276" r="7" fill="#F87171"/><text x="914" y="282" class="find">Contrast below AA</text><text x="914" y="302" class="sc">SC 1.4.3 · P1</text>
    <circle cx="894" cy="340" r="7" fill="#FBBF24"/><text x="914" y="346" class="find">Button has no name</text><text x="914" y="366" class="sc">SC 4.1.2 · P2</text>
    <circle cx="894" cy="404" r="7" fill="#FBBF24"/><text x="914" y="410" class="find">Image missing alt</text><text x="914" y="430" class="sc">SC 1.1.1 · P2</text>
    <circle cx="894" cy="468" r="7" fill="#2DD4BF"/><text x="914" y="474" class="find">Focus order OK</text><text x="914" y="494" class="sc">SC 2.4.3 · pass</text>
  </g>

  <text x="120" y="700" class="h" font-size="34">Accessibility AI Platform</text>
  <text x="120" y="734" class="sub">Cognizant · Intelligent Auditor V2 — LLM over DOM + screenshots</text>
</svg>
