<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-labelledby="t4 d4">
  <title id="t4">Keyboard tab order across ARIA landmarks</title>
  <desc id="d4">A numbered keyboard focus path threads five ARIA-labelled interface nodes, with the focus ring landed on a button, representing ARIA and keyboard-navigation remediation.</desc>
  <defs>
    <radialGradient id="bg4" cx="40%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#16223D"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </radialGradient>
    <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#22304F" stroke-width="1" opacity="0.35"/>
    </pattern>
    <style>
      .eye{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:18px;letter-spacing:3px;fill:#7E92B6}
      .tag{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:16px;letter-spacing:2px;fill:#5B9DFF}
      .role{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:17px;fill:#9FB1D1}
      .num{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:16px;font-weight:700;fill:#0B1220}
      .h{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:700;fill:#EAF1FF}
      .sub{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:22px;fill:#9FB1D1}
      .mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;fill:#7E92B6}
    </style>
  </defs>

  <rect width="1280" height="800" fill="url(#bg4)"/>
  <rect width="1280" height="800" fill="url(#grid4)"/>

  <text x="80" y="92" class="eye">04 · KEYBOARD + ARIA</text>
  <text x="1200" y="92" class="tag" text-anchor="end">jazxii</text>

  <!-- tab-order path (signature: the travelling focus) -->
  <path d="M280 215 C 420 215 380 285 540 285 C 700 285 720 232 880 252
           M880 252 C 760 360 480 380 450 465 C 740 520 760 520 900 530"
        fill="none" stroke="#5B9DFF" stroke-width="2.5" stroke-dasharray="2 9" stroke-linecap="round" opacity="0.7"/>

  <!-- node 1: banner -->
  <rect x="160" y="180" width="240" height="70" rx="14" fill="#16223D" stroke="#2A3A5C"/>
  <text x="184" y="222" class="role">role="banner"</text>
  <circle cx="160" cy="180" r="15" fill="#5B9DFF"/><text x="160" y="186" class="num" text-anchor="middle">1</text>

  <!-- node 2: search -->
  <rect x="520" y="250" width="260" height="70" rx="14" fill="#16223D" stroke="#2A3A5C"/>
  <text x="544" y="292" class="role">role="search"</text>
  <circle cx="520" cy="250" r="15" fill="#5B9DFF"/><text x="520" y="256" class="num" text-anchor="middle">2</text>

  <!-- node 3: button (FOCUSED) -->
  <rect x="860" y="210" width="260" height="84" rx="42" fill="#5B9DFF"/>
  <text x="990" y="260" class="h" font-size="24" text-anchor="middle" fill="#0B1220">Add to cart</text>
  <rect x="848" y="198" width="284" height="108" rx="54" fill="none" stroke="#8FC0FF" stroke-width="3.5"/>
  <rect x="836" y="186" width="308" height="132" rx="62" fill="none" stroke="#5B9DFF" stroke-width="2" opacity="0.45"/>
  <circle cx="872" cy="222" r="15" fill="#EAF1FF"/><text x="872" y="228" class="num" text-anchor="middle">3</text>

  <!-- node 4: navigation -->
  <rect x="300" y="430" width="300" height="70" rx="14" fill="#16223D" stroke="#2A3A5C"/>
  <text x="324" y="472" class="role">role="navigation"</text>
  <circle cx="300" cy="430" r="15" fill="#5B9DFF"/><text x="300" y="436" class="num" text-anchor="middle">4</text>

  <!-- node 5: main region -->
  <rect x="720" y="468" width="360" height="124" rx="18" fill="#101A30" stroke="#2A3A5C"/>
  <text x="744" y="510" class="role">role="main"</text>
  <rect x="744" y="528" width="220" height="14" rx="7" fill="#34456B"/>
  <rect x="744" y="552" width="150" height="12" rx="6" fill="#26334F"/>
  <circle cx="720" cy="468" r="15" fill="#5B9DFF"/><text x="720" y="474" class="num" text-anchor="middle">5</text>

  <!-- footer -->
  <text x="160" y="700" class="h" font-size="34">Digital Accessibility Engineer</text>
  <text x="160" y="734" class="mono" font-size="18">ARIA · Figma review · Jetpack Compose · SwiftUI</text>
</svg>
