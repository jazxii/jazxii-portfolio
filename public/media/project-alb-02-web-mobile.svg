<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-labelledby="t2 d2">
  <title id="t2">Web and mobile accessibility across two surfaces</title>
  <desc id="d2">A browser window and a phone, both showing the same focused "Add to cart" control with a screen-reader announcement, representing audits across web and the Unified Mobile App.</desc>
  <defs>
    <radialGradient id="bg2" cx="42%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#16223D"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </radialGradient>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#22304F" stroke-width="1" opacity="0.35"/>
    </pattern>
    <style>
      .eye{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:18px;letter-spacing:3px;fill:#7E92B6}
      .tag{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:16px;letter-spacing:2px;fill:#5B9DFF}
      .h{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:700;fill:#EAF1FF}
      .sub{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:22px;fill:#9FB1D1}
      .mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;fill:#9FB1D1}
      .ui{font-family:'Inter','Helvetica Neue',Arial,sans-serif;fill:#C7D4EC}
    </style>
  </defs>

  <rect width="1280" height="800" fill="url(#bg2)"/>
  <rect width="1280" height="800" fill="url(#grid2)"/>

  <text x="80" y="92" class="eye">02 · WEB + MOBILE</text>
  <text x="1200" y="92" class="tag" text-anchor="end">jazxii</text>

  <!-- BROWSER -->
  <g transform="translate(120,170)">
    <rect width="640" height="440" rx="20" fill="#101A30" stroke="#2A3A5C" stroke-width="1.5"/>
    <rect width="640" height="56" rx="20" fill="#16223D"/>
    <rect y="40" width="640" height="16" fill="#16223D"/>
    <circle cx="32" cy="28" r="7" fill="#FF6B6B"/>
    <circle cx="58" cy="28" r="7" fill="#F6A623"/>
    <circle cx="84" cy="28" r="7" fill="#3DD68C"/>
    <rect x="120" y="16" width="380" height="24" rx="12" fill="#0B1220"/>
    <text x="138" y="33" class="mono" font-size="13" fill="#7E92B6">albertsons.com/product</text>

    <!-- product card -->
    <rect x="40" y="96" width="200" height="220" rx="16" fill="#16223D" stroke="#2A3A5C"/>
    <rect x="64" y="120" width="152" height="120" rx="10" fill="#0B1220"/>
    <path d="M118 200c0-16 13-29 22-29s22 13 22 29" fill="none" stroke="#3DD68C" stroke-width="6" stroke-linecap="round"/>
    <circle cx="140" cy="166" r="14" fill="#F6A623"/>
    <rect x="64" y="256" width="120" height="14" rx="7" fill="#34456B"/>
    <rect x="64" y="282" width="80" height="12" rx="6" fill="#26334F"/>

    <!-- focused button (signature) -->
    <rect x="288" y="206" width="300" height="92" rx="48" fill="#5B9DFF"/>
    <text x="438" y="262" class="h" font-size="30" text-anchor="middle" fill="#0B1220">Add to cart</text>
    <rect x="276" y="194" width="324" height="116" rx="58" fill="none" stroke="#8FC0FF" stroke-width="3.5"/>
    <rect x="264" y="182" width="348" height="140" rx="66" fill="none" stroke="#5B9DFF" stroke-width="2" opacity="0.45"/>

    <rect x="288" y="116" width="300" height="20" rx="10" fill="#26334F"/>
    <rect x="288" y="150" width="220" height="16" rx="8" fill="#1E2B47"/>
  </g>

  <!-- PHONE -->
  <g transform="translate(840,150)">
    <rect width="300" height="500" rx="44" fill="#101A30" stroke="#2A3A5C" stroke-width="1.5"/>
    <rect x="14" y="14" width="272" height="472" rx="32" fill="#0B1220"/>
    <rect x="112" y="26" width="76" height="14" rx="7" fill="#16223D"/>

    <rect x="40" y="70" width="220" height="150" rx="16" fill="#16223D"/>
    <circle cx="100" cy="140" r="22" fill="#F6A623"/>
    <path d="M150 168c0-22 18-40 30-40s30 18 30 40" fill="none" stroke="#3DD68C" stroke-width="8" stroke-linecap="round"/>

    <rect x="40" y="244" width="160" height="16" rx="8" fill="#34456B"/>
    <rect x="40" y="276" width="110" height="14" rx="7" fill="#26334F"/>

    <!-- focused mobile button + TalkBack cursor box -->
    <rect x="40" y="330" width="220" height="74" rx="37" fill="#5B9DFF"/>
    <text x="150" y="376" class="h" font-size="24" text-anchor="middle" fill="#0B1220">Add to cart</text>
    <rect x="28" y="318" width="244" height="98" rx="20" fill="none" stroke="#8FC0FF" stroke-width="3" stroke-dasharray="2 7" stroke-linecap="round"/>
  </g>

  <!-- screen-reader announcement chip -->
  <g transform="translate(470,470)">
    <rect width="430" height="62" rx="31" fill="#0B1220" stroke="#5B9DFF" stroke-width="1.5"/>
    <circle cx="38" cy="31" r="14" fill="#5B9DFF"/>
    <path d="M32 31h12M38 25v12" stroke="#0B1220" stroke-width="2.5" stroke-linecap="round"/>
    <text x="66" y="37" class="mono" font-size="16" fill="#C7D4EC">“button · Add to cart · 1 of 3”</text>
  </g>

  <!-- footer -->
  <text x="120" y="712" class="h" font-size="34">Digital Accessibility Engineer</text>
  <text x="120" y="746" class="mono" font-size="18" fill="#7E92B6">NVDA · VoiceOver · TalkBack</text>
</svg>
