<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-labelledby="pt1 pd1">
  <title id="pt1">Selenium test automation suite passing</title>
  <desc id="pd1">A continuous-integration style test runner showing Selenium, TestNG and Maven suites passing across multiple client accounts to WCAG A and AA.</desc>
  <defs>
    <radialGradient id="pbg1" cx="46%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#0C2129"/><stop offset="100%" stop-color="#06100F"/>
    </radialGradient>
    <pattern id="pg1" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#143036" stroke-width="1" opacity="0.5"/>
    </pattern>
    <style>
      .eye{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:18px;letter-spacing:3px;fill:#5E9389}
      .tag{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:16px;letter-spacing:2px;fill:#34D399}
      .row{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:19px;fill:#C7EFE5}
      .dur{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:16px;fill:#5E9389}
      .h{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:700;fill:#E6FBF4}
      .sub{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:22px;fill:#8FBDB4}
      .chip{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:16px;fill:#34D399}
    </style>
  </defs>
  <rect width="1280" height="800" fill="url(#pbg1)"/><rect width="1280" height="800" fill="url(#pg1)"/>
  <text x="80" y="92" class="eye">01 · TEST AUTOMATION</text>
  <text x="1200" y="92" class="tag" text-anchor="end">jazxii</text>

  <!-- runner panel -->
  <rect x="160" y="150" width="960" height="384" rx="20" fill="#0E2329" stroke="#1C3A40" stroke-width="1.5"/>
  <rect x="160" y="150" width="960" height="54" rx="20" fill="#0F2A30"/><rect x="160" y="188" width="960" height="16" fill="#0F2A30"/>
  <circle cx="192" cy="177" r="7" fill="#FB7185"/><circle cx="216" cy="177" r="7" fill="#FBBF24"/><circle cx="240" cy="177" r="7" fill="#34D399"/>
  <text x="280" y="183" class="dur" font-size="15">mvn test — TestNG · Selenium Grid</text>

  <!-- test rows -->
  <g>
    <g transform="translate(196,244)"><circle cx="12" cy="-6" r="13" fill="#34D399"/><path d="M6 -6l4 4 8 -9" fill="none" stroke="#06100F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="40" y="0" class="row">PdpPage_LandmarksAndRoles</text><text x="900" y="0" class="dur" text-anchor="end">1.2s</text></g>
    <g transform="translate(196,290)"><circle cx="12" cy="-6" r="13" fill="#34D399"/><path d="M6 -6l4 4 8 -9" fill="none" stroke="#06100F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="40" y="0" class="row">Checkout_KeyboardTrap_None</text><text x="900" y="0" class="dur" text-anchor="end">0.8s</text></g>
    <g transform="translate(196,336)"><circle cx="12" cy="-6" r="13" fill="#34D399"/><path d="M6 -6l4 4 8 -9" fill="none" stroke="#06100F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="40" y="0" class="row">Cart_ColorContrast_AA</text><text x="900" y="0" class="dur" text-anchor="end">1.5s</text></g>
    <g transform="translate(196,382)"><circle cx="12" cy="-6" r="13" fill="#34D399"/><path d="M6 -6l4 4 8 -9" fill="none" stroke="#06100F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="40" y="0" class="row">Nav_FocusOrder_Logical</text><text x="900" y="0" class="dur" text-anchor="end">0.6s</text></g>
    <g transform="translate(196,428)"><circle cx="12" cy="-6" r="13" fill="#34D399"/><path d="M6 -6l4 4 8 -9" fill="none" stroke="#06100F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="40" y="0" class="row">Forms_NameRoleValue_A</text><text x="900" y="0" class="dur" text-anchor="end">1.1s</text></g>
  </g>
  <!-- summary bar -->
  <rect x="196" y="466" width="888" height="44" rx="10" fill="#10331F"/>
  <text x="216" y="494" class="chip" fill="#34D399" font-weight="700">BUILD PASSED</text>
  <text x="1064" y="494" class="dur" text-anchor="end" fill="#8FBDB4">142 / 142 · WCAG A/AA</text>

  <!-- chips -->
  <g transform="translate(160,566)">
    <rect width="150" height="44" rx="22" fill="#0E2329" stroke="#1C3A40"/><text x="75" y="29" class="chip" text-anchor="middle">Selenium</text>
    <rect x="166" width="130" height="44" rx="22" fill="#0E2329" stroke="#1C3A40"/><text x="231" y="29" class="chip" text-anchor="middle">TestNG</text>
    <rect x="312" width="120" height="44" rx="22" fill="#0E2329" stroke="#1C3A40"/><text x="372" y="29" class="chip" text-anchor="middle">Maven</text>
    <rect x="448" width="200" height="44" rx="22" fill="#0E2329" stroke="#22D3EE"/><text x="548" y="29" class="chip" fill="#22D3EE" text-anchor="middle">5+ accounts</text>
    <rect x="664" width="240" height="44" rx="22" fill="#0E2329" stroke="#1C3A40"/><text x="784" y="29" class="chip" text-anchor="middle">Agile + Waterfall</text>
  </g>

  <text x="160" y="700" class="h" font-size="34">Program Analyst Trainee</text>
  <text x="160" y="734" class="sub">Cognizant · NFT shared-services · QA &amp; accessibility</text>
</svg>
