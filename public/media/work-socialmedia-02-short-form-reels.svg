<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-labelledby="ht2 hd2">
  <title id="ht2">Short-form vertical reels production</title>
  <desc id="hd2">A vertical reel playing on a phone with engagement controls, representing 250 static and one-minute short-form video pieces.</desc>
  <defs>
    <radialGradient id="hbg2" cx="38%" cy="28%" r="95%"><stop offset="0%" stop-color="#2A0E28"/><stop offset="100%" stop-color="#120713"/></radialGradient>
    <pattern id="hg2" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#33152F" stroke-width="1" opacity="0.55"/></pattern>
    <linearGradient id="warm2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF4D6D"/><stop offset="50%" stop-color="#FB5607"/><stop offset="100%" stop-color="#FFB703"/></linearGradient>
    <linearGradient id="reel" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7B2FF7"/><stop offset="55%" stop-color="#C9184A"/><stop offset="100%" stop-color="#FB8500"/></linearGradient>
    <style>
      .eye{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:18px;letter-spacing:3px;fill:#C77FA8}
      .tag{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:16px;letter-spacing:2px;fill:#FF4D6D}
      .big{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:800;fill:#FFF1F4}
      .lab{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:22px;fill:#E0A9C0}
      .h{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:800;fill:#FFF1F4}
      .sub{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:22px;fill:#E0A9C0}
      .time{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-size:15px;fill:#FFF1F4}
    </style>
  </defs>
  <rect width="1280" height="800" fill="url(#hbg2)"/><rect width="1280" height="800" fill="url(#hg2)"/>
  <text x="80" y="92" class="eye">02 · SHORT-FORM</text>
  <text x="1200" y="92" class="tag" text-anchor="end">jazxii</text>

  <!-- phone -->
  <g transform="translate(170,140)">
    <rect width="320" height="560" rx="44" fill="#1B0A1A" stroke="#46213F" stroke-width="2"/>
    <rect x="16" y="16" width="288" height="528" rx="32" fill="url(#reel)"/>
    <rect x="16" y="16" width="288" height="528" rx="32" fill="#120713" opacity="0.18"/>
    <!-- play -->
    <circle cx="160" cy="270" r="52" fill="#FFF1F4" opacity="0.92"/>
    <path d="M146 244l34 26 -34 26z" fill="#120713"/>
    <!-- engagement icons -->
    <g fill="#FFF1F4">
      <path d="M276 360c-10 -12 -28 -2 -16 12l16 16 16 -16c12 -14 -6 -24 -16 -12z"/>
      <rect x="266" y="406" width="22" height="18" rx="6" fill="none" stroke="#FFF1F4" stroke-width="3"/>
      <path d="M268 452l24 -12 -24 -12 6 12z" fill="none" stroke="#FFF1F4" stroke-width="3" stroke-linejoin="round"/>
    </g>
    <!-- caption + progress -->
    <rect x="36" y="470" width="150" height="12" rx="6" fill="#FFF1F4" opacity="0.85"/>
    <rect x="36" y="492" width="100" height="10" rx="5" fill="#FFF1F4" opacity="0.55"/>
    <rect x="36" y="520" width="248" height="6" rx="3" fill="#FFF1F4" opacity="0.3"/>
    <rect x="36" y="520" width="150" height="6" rx="3" fill="#FFF1F4"/>
    <text x="284" y="514" class="time" text-anchor="end">0:60</text>
  </g>

  <!-- stats -->
  <g transform="translate(580,200)">
    <text x="0" y="40" class="big" font-size="120" fill="url(#warm2)">250</text>
    <text x="0" y="92" class="lab">platform-ready content pieces</text>

    <rect x="0" y="150" width="240" height="60" rx="30" fill="#26122A" stroke="#FB5607"/><text x="120" y="188" class="h" font-size="22" text-anchor="middle" fill="#FFB703">1-minute reels</text>
    <rect x="260" y="150" width="240" height="60" rx="30" fill="#26122A" stroke="#46213F"/><text x="380" y="188" class="h" font-size="22" text-anchor="middle">static + video</text>

    <rect x="0" y="230" width="500" height="60" rx="30" fill="#1E0C20" stroke="#46213F"/><text x="24" y="268" class="lab" font-size="20">Mar — Apr 2024 · tight production timeline</text>
  </g>

  <text x="580" y="700" class="h" font-size="30" fill="url(#warm2)">House of Alt — Social Media Campaign</text>
  <text x="580" y="734" class="sub">Media team · static + short-form video production</text>
</svg>
